<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Architise — redirecting…</title>
  <meta name="robots" content="noindex">
  <script>
    // Pass language preference to the standalone Architise tool
    var lang = new URLSearchParams(location.search).get('lang')
            || localStorage.getItem('arit-lang')
            || localStorage.getItem('architise-lang')
            || 'nl';
    location.replace('https://aruijter72.github.io/Archimate-engine/?lang=' + lang);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://aruijter72.github.io/Archimate-engine/">
  </noscript>
</head>
<body>
  <p>Redirecting to <a href="https://aruijter72.github.io/Archimate-engine/">Architise</a>…</p>
</body>
</html>
