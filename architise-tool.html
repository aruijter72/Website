<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architise — ArchiMate & Swimlane tool by Arnold Ruijter IT</title>
  <meta name="description" content="Free browser-based ArchiMate 3 modelling and swimlane diagram tool by Arnold Ruijter IT.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    iframe {
      display: block;
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
  <script>
    // Pass language preference into the iframe src
    var lang = new URLSearchParams(location.search).get('lang')
            || localStorage.getItem('arit-lang')
            || localStorage.getItem('architise-lang')
            || 'nl';
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('tool-frame').src =
        'https://aruijter72.github.io/Architise/?lang=' + lang;
    });
  </script>
</head>
<body>
  <iframe id="tool-frame" src="" allowfullscreen
    title="Architise — ArchiMate & Swimlane tool"></iframe>
</body>
</html>
